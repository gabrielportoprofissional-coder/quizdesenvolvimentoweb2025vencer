<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interativo - HTML, CSS e JavaScript</title>
    <style>
        /* Mesmo CSS da versão anterior, mantido igual */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 20px;
            border-radius: 15px;
        }

        .score-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            min-width: 150px;
            text-align: center;
        }

        .progress-container {
            flex: 1;
            min-width: 250px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            color: #666;
            font-size: 0.9em;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: #f8f9fa;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            color: #555;
            transition: all 0.3s ease;
            min-width: 120px;
            border: 2px solid transparent;
        }

        .tab:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #fff;
        }

        .tab .stats {
            display: block;
            font-size: 0.8em;
            margin-top: 5px;
            opacity: 0.8;
        }

        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-card.correct {
            border-left-color: #4CAF50;
            background: #f1f8e9;
        }

        .question-card.incorrect {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            font-size: 1.1em;
        }

        .correct .question-number {
            color: #4CAF50;
        }

        .incorrect .question-number {
            color: #f44336;
        }

        .question-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-correct {
            background: #4CAF50;
            color: white;
        }

        .status-incorrect {
            background: #f44336;
            color: white;
        }

        .status-pending {
            background: #ff9800;
            color: white;
        }

        .question-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover:not(.disabled) {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        .option.selected.correct-answer {
            border-color: #4CAF50;
            background: #c8e6c9;
        }

        .option.selected.wrong-answer {
            border-color: #f44336;
            background: #ffcdd2;
        }

        .option.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .option input[type="radio"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option.disabled input[type="radio"] {
            cursor: not-allowed;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 1.1em;
            color: #444;
        }

        .option.disabled label {
            cursor: not-allowed;
        }

        .answer-indicator {
            margin-left: 10px;
            font-weight: bold;
        }

        .correct-badge {
            color: #4CAF50;
            font-weight: bold;
        }

        .wrong-badge {
            color: #f44336;
            font-weight: bold;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .nav-btn:not(:disabled) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .reset-btn {
            background: #f44336;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 0.5;
        }

        .reset-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .result-modal.active {
            display: flex;
        }

        .result-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-content h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .final-score {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            line-height: 1;
        }

        .category-results {
            margin: 30px 0;
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
        }

        .category-result {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 1.1em;
        }

        .category-result:last-child {
            border-bottom: none;
        }

        .category-result .correct {
            color: #4CAF50;
            font-weight: bold;
        }

        .accuracy-message {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 10px;
        }

        .close-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .tab {
                font-size: 0.9em;
                padding: 10px;
            }
            
            .question-text {
                font-size: 1.1em;
            }
            
            .option {
                padding: 12px 15px;
            }
            
            .navigation-buttons {
                flex-direction: column;
            }
            
            .reset-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quiz Interativo</h1>
        <div class="subtitle">150 Questões de Múltipla Escolha</div>
        
        <div class="header-stats">
            <div class="score-box">
                <div>Pontuação</div>
                <div style="font-size: 1.5em;"><span id="totalScore">0</span>/150</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-stats">
                    <span>Respondidas: <span id="questionsAnswered">0</span>/150</span>
                    <span>Acertos: <span id="accuracyPercentage">0</span>%</span>
                </div>
            </div>
            <button class="reset-btn" onclick="resetQuiz()">↺ Reiniciar Quiz</button>
        </div>

        <div class="category-tabs">
            <button class="tab active" onclick="changeCategory('html')" id="tabHtml">
                  HTML
                <span class="stats" id="htmlStats">0/50</span>
            </button>
            <button class="tab" onclick="changeCategory('css')" id="tabCss">
                  CSS
                <span class="stats" id="cssStats">0/50</span>
            </button>
            <button class="tab" onclick="changeCategory('javascript')" id="tabJavascript">
                  JavaScript
                <span class="stats" id="javascriptStats">0/50</span>
            </button>
        </div>

        <!-- HTML Section -->
        <div id="htmlSection" class="quiz-section active">
            <div id="htmlQuestions"></div>
        </div>

        <!-- CSS Section -->
        <div id="cssSection" class="quiz-section">
            <div id="cssQuestions"></div>
        </div>

        <!-- JavaScript Section -->
        <div id="javascriptSection" class="quiz-section">
            <div id="javascriptQuestions"></div>
        </div>

        <div class="navigation-buttons">
            <button class="nav-btn" id="prevBtn" onclick="navigateQuestion('prev')" disabled>← Anterior</button>
            <button class="nav-btn" id="nextBtn" onclick="navigateQuestion('next')">Próxima →</button>
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <h2>🎉 Parabéns!</h2>
            <div class="final-score" id="finalScore">0/150</div>
            <div class="category-results" id="categoryResults"></div>
            <div class="accuracy-message" id="accuracyMessage"></div>
            <button class="close-btn" onclick="closeResults()">Ver Resultados</button>
        </div>
    </div>

    <script>
        // Questões de HTML (50)

        // Estado do quiz
        let currentCategory = 'html';
        let currentQuestionIndex = 0;
        let userAnswers = {
            html: new Array(50).fill(null),
            css: new Array(50).fill(null),
            javascript: new Array(50).fill(null)
        };
        let questionResults = {
            html: new Array(50).fill(null),
            css: new Array(50).fill(null),
            javascript: new Array(50).fill(null)
        };

        // Inicialização
        function initQuiz() {
            renderQuestions('html', htmlQuestions);
            renderQuestions('css', cssQuestions);
            renderQuestions('javascript', javascriptQuestions);
            updateAllStats();
            updateNavigation();
        }

        // Renderizar questões
        function renderQuestions(category, questions) {
            const container = document.getElementById(category + 'Questions');
            if (!container) return;
            
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';
                questionCard.id = `${category}-q${index}`;
                
                const selectedOption = userAnswers[category][index];
                const isCorrect = questionResults[category][index];
                
                // Adicionar classe baseada no resultado
                if (isCorrect === true) {
                    questionCard.classList.add('correct');
                } else if (isCorrect === false) {
                    questionCard.classList.add('incorrect');
                }
                
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    const isSelected = selectedOption === optIndex;
                    let optionClass = 'option';
                    
                    if (selectedOption !== null) {
                        optionClass += ' disabled';
                        if (isSelected) {
                            if (isCorrect) {
                                optionClass += ' selected correct-answer';
                            } else {
                                optionClass += ' selected wrong-answer';
                            }
                        }
                    }
                    
                    optionsHtml += `
                        <div class="${optionClass}" onclick="selectOption('${category}', ${index}, ${optIndex})">
                            <input type="radio" name="${category}-q${index}" value="${optIndex}" ${isSelected ? 'checked' : ''} ${selectedOption !== null ? 'disabled' : ''}>
                            <label>${String.fromCharCode(65 + optIndex)}. ${opt}</label>
                            ${isSelected && selectedOption !== null ? 
                                `<span class="answer-indicator ${isCorrect ? 'correct-badge' : 'wrong-badge'}">
                                    ${isCorrect ? '✓ Correto' : '✗ Incorreto'}
                                </span>` : ''}
                        </div>
                    `;
                });

                const statusText = selectedOption !== null 
                    ? (isCorrect ? '✓ Correta' : '✗ Incorreta')
                    : '⏳ Pendente';
                
                const statusClass = selectedOption !== null 
                    ? (isCorrect ? 'status-correct' : 'status-incorrect')
                    : 'status-pending';

                questionCard.innerHTML = `
                    <div class="question-header">
                        <span class="question-number">Questão ${index + 1} de 50</span>
                        <span class="question-status ${statusClass}">
                            ${statusText}
                        </span>
                    </div>
                    <div class="question-text">${index + 1}. ${q.question}</div>
                    <div class="options">
                        ${optionsHtml}
                    </div>
                `;
                
                container.appendChild(questionCard);
            });
        }

        // Selecionar opção
        function selectOption(category, questionIndex, optionIndex) {
            // Se já respondeu, não permitir alterar
            if (userAnswers[category][questionIndex] !== null) {
                return;
            }
            
            // Salvar resposta
            userAnswers[category][questionIndex] = optionIndex;
            
            // Verificar se está correta
            const questions = category === 'html' ? htmlQuestions : 
                             category === 'css' ? cssQuestions : javascriptQuestions;
            const isCorrect = questions[questionIndex].answer === optionIndex;
            questionResults[category][questionIndex] = isCorrect;
            
            // Atualizar UI
            renderQuestions(category, questions);
            updateAllStats();
            
            // Verificar se completou todas as questões
            checkQuizCompletion();
        }

        // Atualizar estatísticas
        function updateAllStats() {
            let totalAnswered = 0;
            let totalCorrect = 0;
            
            // Calcular totais por categoria
            ['html', 'css', 'javascript'].forEach(cat => {
                const answered = userAnswers[cat].filter(a => a !== null).length;
                const correct = questionResults[cat].filter(r => r === true).length;
                
                totalAnswered += answered;
                totalCorrect += correct;
                
                // Atualizar stats das categorias
                const statsElement = document.getElementById(cat + 'Stats');
                if (statsElement) {
                    statsElement.textContent = `${correct}/50`;
                }
            });
            
            // Atualizar estatísticas gerais
            document.getElementById('totalScore').textContent = totalCorrect;
            document.getElementById('questionsAnswered').textContent = totalAnswered;
            
            const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            document.getElementById('accuracyPercentage').textContent = accuracy;
            
            const progressPercentage = (totalAnswered / 150) * 100;
            document.getElementById('progressFill').style.width = progressPercentage + '%';
        }

        // Mudar categoria
        function changeCategory(category) {
            currentCategory = category;
            currentQuestionIndex = 0;
            
            // Atualizar tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab' + category.charAt(0).toUpperCase() + category.slice(1)).classList.add('active');
            
            // Atualizar seções
            document.querySelectorAll('.quiz-section').forEach(section => section.classList.remove('active'));
            document.getElementById(category + 'Section').classList.add('active');
            
            // Rolar para o topo
            window.scrollTo(0, 0);
            
            // Atualizar navegação
            updateNavigation();
        }

        // Navegar entre questões
        function navigateQuestion(direction) {
            const totalQuestions = 50;
            
            if (direction === 'next' && currentQuestionIndex < totalQuestions - 1) {
                currentQuestionIndex++;
            } else if (direction === 'prev' && currentQuestionIndex > 0) {
                currentQuestionIndex--;
            }
            
            // Rolar para a questão atual
            const questionElement = document.getElementById(`${currentCategory}-q${currentQuestionIndex}`);
            if (questionElement) {
                questionElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            updateNavigation();
        }

        // Atualizar botões de navegação
        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === 49;
        }

        // Verificar se quiz está completo
        function checkQuizCompletion() {
            const totalAnswered = Object.values(userAnswers).reduce((acc, cat) => 
                acc + cat.filter(a => a !== null).length, 0);
            
            if (totalAnswered === 150) {
                showResults();
            }
        }

        // Mostrar resultados
        function showResults() {
            const modal = document.getElementById('resultModal');
            const totalCorrect = Object.values(questionResults).reduce((acc, cat) => 
                acc + cat.filter(r => r === true).length, 0);
            
            document.getElementById('finalScore').textContent = `${totalCorrect}/150`;
            
            const accuracy = ((totalCorrect / 150) * 100).toFixed(1);
            
            let categoryResults = '';
            const categories = ['HTML', 'CSS', 'JavaScript'];
            categories.forEach((cat, index) => {
                const catKey = cat.toLowerCase();
                const correct = questionResults[catKey].filter(r => r === true).length;
                const percentage = (correct / 50 * 100).toFixed(1);
                categoryResults += `
                    <div class="category-result">
                        <strong>${cat}:</strong>
                        <span class="${correct >= 35 ? 'correct' : ''}">${correct}/50 (${percentage}%)</span>
                    </div>
                `;
            });
            
            document.getElementById('categoryResults').innerHTML = categoryResults;
            document.getElementById('accuracyMessage').innerHTML = 
                `Taxa de acertos: <strong>${accuracy}%</strong><br>${getPerformanceMessage(accuracy)}`;
            
            modal.classList.add('active');
        }

        // Mensagem de desempenho
        function getPerformanceMessage(accuracy) {
            if (accuracy >= 90) return "🏆 Excelente! Você é um verdadeiro expert!";
            if (accuracy >= 80) return "🌟 Muito bom! Seu conhecimento é impressionante!";
            if (accuracy >= 70) return "📚 Bom trabalho! Continue praticando!";
            if (accuracy >= 60) return "👍 Vamos estudar mais um pouco!";
            return "💪 Continue firme nos estudos! A prática leva à perfeição!";
        }

        // Fechar resultados
        function closeResults() {
            document.getElementById('resultModal').classList.remove('active');
        }

        // Reiniciar quiz
        function resetQuiz() {
            if (confirm('Tem certeza que deseja reiniciar o quiz? Todo o seu progresso será perdido.')) {
                userAnswers = {
                    html: new Array(50).fill(null),
                    css: new Array(50).fill(null),
                    javascript: new Array(50).fill(null)
                };
                questionResults = {
                    html: new Array(50).fill(null),
                    css: new Array(50).fill(null),
                    javascript: new Array(50).fill(null)
                };
                
                renderQuestions('html', htmlQuestions);
                renderQuestions('css', cssQuestions);
                renderQuestions('javascript', javascriptQuestions);
                updateAllStats();
                
                currentQuestionIndex = 0;
                updateNavigation();
            }
        }

        // Iniciar quiz quando a página carregar
        window.onload = initQuiz;
    </script>
